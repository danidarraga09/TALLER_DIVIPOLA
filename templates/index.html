<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">

    <title>DIVIPOLA MAP</title>

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <style>

        body {
            margin: 0;
            padding: 0;
        }

        #map {
            height: 100vh;
            width: 100%;
        }

    </style>

</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

    // Crear mapa
    var map = L.map('map').setView([4.5709, -74.2973], 6)

    // Fondo OpenStreetMap
    L.tileLayer(
        'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
        {
            attribution: '&copy; OpenStreetMap contributors'
        }
    ).addTo(map)

    // Datos enviados desde Flask
    console.log("Markers recibidos:", {{ markers | length }})

    var markers = {{ markers | tojson }}

    // Crear marcadores
    markers.forEach(function(marker) {

        L.marker([marker.lat, marker.lon])
            .addTo(map)
            .bindPopup(
                "<b>" + marker.city + "</b><br>" +
                marker.department
            )
    })

</script>

</body>
</html>
